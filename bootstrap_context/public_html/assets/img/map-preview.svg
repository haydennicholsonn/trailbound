<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Trailbound map preview</title>
  <desc id="desc">A dark fantasy map with glowing roads, forest shapes, a shrine marker, and fog.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
